{% extends "base.html" %}

{% block title %}Página no encontrada - 404{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px; margin: 40px auto; text-align: center; padding: 20px;">
    <div class="tarjeta-admin" style="padding: 40px 20px;">
        <h1 style="font-size: 4em; color: var(--accent-color, #e74c3c); margin: 0;">404</h1>
        <h2 style="margin-top: 10px; color: #2c3e50;">¡Página no encontrada!</h2>
        <p style="color: #666; margin: 20px 0; font-size: 1.1em; line-height: 1.5;">
            Lo sentimos, la página o recurso que estás buscando no existe o ha sido movida.
        </p>
        <a href="{{ url_for('ver_agenda') }}" class="btn" style="padding: 10px 25px; font-weight: bold;">
            Volver a Mi Agenda
        </a>
    </div>
</div>
{% endblock %}

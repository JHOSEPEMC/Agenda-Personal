{% extends "base.html" %}

{% block title %}Crear Anotación{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px; margin: 0 auto; padding: 20px;">
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1 style="margin: 0; color: var(--accent-color, #2c3e50);">Nueva Anotación</h1>
        <a href="{{ url_for('ver_agenda') }}" class="btn" style="background-color: #7f8c8d; padding: 8px 16px; font-size: 0.9em;">
            &laquo; Volver a la Agenda
        </a>
    </div>

    <div class="tarjeta-admin" style="padding: 25px;">
        <form method="POST" action="{{ url_for('crear_anotacion') }}">
            
            <div class="form-group" style="margin-bottom: 20px;">
                <label for="fecha" style="font-weight: bold; margin-bottom: 8px; display: block;">Fecha:</label>
                <input type="date" id="fecha" name="fecha" class="form-control" style="width: 100%; padding: 10px; font-size: 1em;" required>
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label for="anotacion" style="font-weight: bold; margin-bottom: 8px; display: block;">Anotación / Notas:</label>
                <textarea id="anotacion" name="anotacion" class="form-control" rows="8" style="width: 100%; padding: 10px; font-size: 1em; resize: vertical;" placeholder="Escribe aquí las tareas o notas para esta fecha..." required></textarea>
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <a href="{{ url_for('ver_agenda') }}" class="btn" style="background-color: #7f8c8d;">Cancelar</a>
                <button type="submit" class="btn" style="padding: 10px 20px; font-weight: bold;">Guardar Anotación</button>
            </div>

        </form>
    </div>

</div>
{% endblock %}

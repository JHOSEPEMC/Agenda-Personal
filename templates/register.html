{% extends "base.html" %}
{% block title %}Registrarse{% endblock %}
{% block content %}
<div class="columnas">
    <div class="columna1">
        <h2>Registro de Postulante</h2>
        <form action="{{ url_for('postular') }}" method="post" id="registrationForm">
            <div class="field">
                <input type="text" id="nombres" name="nombres" required>
                <label for="nombres">Nombres:</label>
            </div>

            <div class="field">
                <input type="text" id="apellidos" name="apellidos" required>
                <label for="apellidos">Apellidos:</label>
            </div>

            <div class="field">
                <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" required>
                <label for="fecha_nacimiento">Fecha de Nacimiento:</label>
            </div>

            <div class="field">
                <input type="email" id="correo" name="correo" required>
                <label for="correo">Correo:</label>
            </div>

            <div class="field">
                <input type="text" id="dni" name="dni" required maxlength="8">
                <label for="dni">DNI:</label>
            </div>

            <div class="field">
                <input type="password" id="password" name="password" required>
                <label for="password">Contraseña:</label>
            </div>

            <div class="field">
                <input type="password" id="password_confirm" name="password_confirm" required>
                <label for="password_confirm">Confirmar contraseña:</label>
            </div>
            <div class="form-actions button-send">
                <button type="submit">Postular</button>
            </div>
        </form>
        <p style="margin-top: 15px;">¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión aquí</a></p>
    </div>
    <div class="columna2">
        <img src="{{ url_for('static', filename='image_column2.png') }}" alt="Imagen de colunma 2">
    </div>
</div>
{% endblock %}
